issues:
  - title: "Repo bootstrap: define public repository contract and board rules"
    labels: ["area:repo", "priority:P0", "status:done"]
    status: "done"
    body: |
      Goal
      - Establish the public repo, naming, scope, and issue-based project management rules.

      Decisions already made in discussion
      - Public repository.
      - Verification-first orientation.
      - GitHub Issues are the source of truth for progress.
      - Status-driven workflow with explicit labels.

      Acceptance criteria
      - Repository exists and is public.
      - README explains the repo purpose.
      - A board/status scheme is documented.
      - Labels exist for status and priority.

  - title: "Chapter 01 map: pilot the verification design"
    labels: ["area:docs", "priority:P0", "status:done"]
    status: "done"
    depends_on:
      - "Source grounding gap: record original article/course material"
    body: |
      Goal
      - Build the first concrete chapter-to-verification map for Chapter 01 only.
      - Use Chapter 01 as the pilot design before expanding the same pattern to the remaining chapters.
      - Review the Chapter 01 map only after the source-grounding gap has been addressed.

      Scope
      - Chapter 01: Capability does not imply reliability.
      - Define the chapter claim, failure mode, verification type, minimal scenario, pass/fail rule, and smoke-test need.
      - Do not try to complete the full 12-chapter matrix in this issue.
      - Treat docs/source-map.md as the upstream source-grounding record for this issue.

      Design intent
      - Chapter 01 is the calibration case for the whole verification lab.
      - Later tasks (#3 deterministic framework, #4 real-agent smoke harness, and #5 experiment set) should first be shaped around the Chapter 01 pilot so the design can be reviewed before being generalized.
      - The map must distinguish source claims from this repo's engineering interpretation and validator design.

      Acceptance criteria
      - docs/source-material.md records the source course and upstream references.
      - docs/source-map.md contains the Chapter 01 source-claim → project-interpretation → verification-hypothesis mapping.
      - docs/chapter-map.md contains a concrete Chapter 01 verification entry.
      - The entry is specific enough to drive the first deterministic test design.
      - The entry identifies what should be handled by deterministic verification vs. real-agent smoke testing.
      - Open design questions are explicitly listed for review before expanding to other chapters.

  - title: "Source grounding gap: record original article/course material"
    labels: ["area:docs", "priority:P0", "status:done"]
    status: "done"
    body: |
      Goal
      - Record the source course material that this verification lab is based on.
      - Prevent downstream issues from turning unverified assumptions into implementation work.

      Scope
      - Add source metadata and citation policy.
      - Add a source-map pattern that separates source claims, project interpretation, and verification hypotheses.
      - Ground Chapter 01 first; defer other chapters until reviewed.

      Acceptance criteria
      - docs/source-material.md exists and records the primary course URL plus upstream references listed by the course.
      - docs/source-map.md contains the Chapter 01 source mapping.
      - docs/chapter-map.md points to the source-map entry.
      - Issue #2 is explicitly dependency-gated on this source-grounding work.

  - title: "Deterministic verification framework"
    labels: ["area:tests", "priority:P0", "status:done"]
    status: "done"
    body: |
      Goal
      - Build a deterministic test framework that validates harness behavior without relying on model stochasticity.

      Discussion summary
      - Most chapters should be verified with reproducible tests.
      - Real-agent smoke tests should remain a smaller layer, not the main evidence.

      Acceptance criteria
      - Test harness supports reproducible scenario execution.
      - Each scenario has clear expected outcomes.
      - Test results can be summarized in reports.
      - Chapter 01 validator exists at `harness_lab/chapter01.py`.
      - Chapter 01 CLI can validate reports and write a JSON summary file.
      - Chapter 01 positive and negative fixtures are covered by tests.

  - title: "Real-agent smoke test harness"
    labels: ["area:smoke", "priority:P1", "status:done"]
    status: "done"
    body: |
      Goal
      - Add a small set of real-agent smoke tests that validate the end-to-end engineering loop under sandboxed conditions.

      Discussion summary
      - Smoke tests must stay small, bounded, and representative.
      - They should verify the harness under real agent/tool execution, not just model outputs.
      - Success is determined externally by a validator, not by agent self-report.

      Acceptance criteria
      - Each smoke scenario has a manifest, runner, validator, and isolated workspace.
      - Tasks are short and sandboxed.
      - Results are recorded and reproducible.
      - Chapter 01 smoke manifest exists at `smoke/chapter-01/manifest.json`.
      - Smoke runner exists at `harness_lab/smoke.py`.
      - Positive and self-report-only negative smoke scenarios are covered by tests.

  - title: "Chapter 1-4 experiment set"
    labels: ["area:experiments", "chapter:01", "chapter:02", "chapter:03", "chapter:04", "priority:P1", "status:ready"]
    status: "ready"
    body: |
      Goal
      - Build experiment cases for the first four chapters.

      Chapters covered
      - 01 Capability vs reliability
      - 02 What a harness actually is
      - 03 Repository as the system of record
      - 04 Split instructions across files

      Acceptance criteria
      - Each chapter has at least one minimal experiment.
      - Each experiment has an objective, setup, and pass/fail rule.
      - Chapter 01 experiment fixtures exist under `experiments/chapter-01/fixtures/`.
      - Chapter 01 experiment documentation exists at `experiments/chapter-01/README.md`.

  - title: "Chapter 5-8 experiment set"
    labels: ["area:experiments", "chapter:05", "chapter:06", "chapter:07", "chapter:08", "priority:P1", "status:ready"]
    status: "ready"
    body: |
      Goal
      - Build experiment cases for the middle four chapters.

      Chapters covered
      - 05 Cross-session continuity
      - 06 Explicit initialization phase
      - 07 Clear task boundaries
      - 08 Feature list as the control surface

      Acceptance criteria
      - Each chapter has a minimal reproducible check.
      - Continuity, initialization, task scoping, and feature-state controls are represented.

  - title: "Chapter 9-12 experiment set"
    labels: ["area:experiments", "chapter:09", "chapter:10", "chapter:11", "chapter:12", "priority:P1", "status:ready"]
    status: "ready"
    body: |
      Goal
      - Build experiment cases for the final four chapters.

      Chapters covered
      - 09 Prevent premature completion claims
      - 10 End-to-end verification
      - 11 Observability inside the harness
      - 12 Clean handoff at session end

      Acceptance criteria
      - Each chapter has at least one verification path.
      - E2E, observability, and handoff checks are explicit.

  - title: "Reporting and CI automation"
    labels: ["area:infra", "priority:P2", "status:ready"]
    status: "ready"
    body: |
      Goal
      - Add CI and reporting so the repo can produce readable verification summaries.

      Acceptance criteria
      - Automated checks run in CI.
      - Results can be exported into reports.
      - The board status can be reflected from completed work.
